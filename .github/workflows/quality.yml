name: quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test-security:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore locked dependencies
        run: dotnet restore UsbForensicAudit.sln --locked-mode

      - name: Build with warnings as errors
        run: dotnet build UsbForensicAudit.sln -c Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test tests/UsbForensicAudit.Tests/UsbForensicAudit.Tests.csproj
          -c Release --no-build --no-restore
          --collect:"XPlat Code Coverage"
          --settings tests/UsbForensicAudit.Tests/coverlet.runsettings
          --results-directory TestResults

      - name: Enforce 90 percent line coverage
        shell: pwsh
        run: |
          $report = Get-ChildItem TestResults -Recurse -Filter coverage.cobertura.xml |
            Sort-Object LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if (-not $report) { throw "Coverage report was not produced." }
          [xml]$coverage = Get-Content $report.FullName
          $lineRate = [double]::Parse(
            $coverage.coverage.'line-rate',
            [Globalization.CultureInfo]::InvariantCulture)
          Write-Host ("Line coverage: {0:P2}" -f $lineRate)
          if ($lineRate -lt 0.90) { throw "Line coverage is below 90%." }

      - name: Reject vulnerable dependencies
        shell: pwsh
        run: |
          $audit = dotnet list UsbForensicAudit.sln package --vulnerable --include-transitive 2>&1
          $audit | Write-Host
          if ($audit -match "following vulnerable packages") {
            throw "Vulnerable NuGet dependencies detected."
          }

      - name: Publish self-contained application
        run: >
          dotnet publish UsbForensicAudit.csproj
          -c Release -r win-x64 --self-contained true
          -p:RestoreLockedMode=true -o artifacts/publish

      - uses: actions/upload-artifact@v7
        with:
          name: UsbForensicAudit-win-x64
          path: artifacts/publish
          if-no-files-found: error
